[settings]
# Don't install "latest"/fuzzy versions released within the last 7 days.
# Pinned versions bypass this; per-tool overrides take precedence.
minimum_release_age = "7d"

[tools]
bun           = "1"
circleci      = "latest"
go            = "1.26"
golangci-lint = "2"
helm          = "4"
java          = ["temurin-21", "temurin-17"]
jq            = "1"
just          = "1"
kubectl       = "latest"
node          = ["latest", "20", "24"]
"npm:ccstatusline" = "latest"
"npm:pnpm"    = "latest"
python        = "3.12"
rust          = "latest"
terraform     = "latest"
terragrunt    = "1"
uv            = "latest"
