# ─── Prefix ───────────────────────────────────────────
# Keep default Ctrl+b

# ─── Core Behavior ────────────────────────────────────
set -g mouse on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g detach-on-destroy off
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ─── Key Bindings ─────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind C-c new-session
bind x kill-pane

# Splits (open at current path)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Vi Copy Mode ─────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"

# ─── Plugins (TPM) ────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Dracula theme (owns status-left/status-right — do not set manually)
set -g @plugin 'dracula/tmux'
set -g @dracula-plugins "git battery cpu-usage ram-usage time"
set -g @dracula-show-powerline true
set -g @dracula-show-flags true
set -g @dracula-show-left-icon session
set -g @dracula-border-contrast true
set -g @dracula-git-show-current-symbol ✓
set -g @dracula-git-show-diff-symbol !
set -g @dracula-show-timezone false
set -g @dracula-time-format "%H:%M"
set -g @dracula-show-battery-status true

# Per-project colorization
set -g @plugin 'imomaliev/tmux-peacock'

# Fuzzy session picker (prefix + o)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '55%'
set -g @sessionx-filter-current 'false'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-window-mode 'on'
set -g @sessionx-tree-mode 'on'

# Notifications for long-running commands
set -g @plugin 'rickstaa/tmux-notify'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
