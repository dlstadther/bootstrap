# ─── Prefix ──────────────────────────────────────────
# Remap to Ctrl+a (screen-style) — comment out to keep Ctrl+b
#unbind C-b
#set -g prefix C-a
#bind C-a send-prefix

# ─── Core Behavior ───────────────────────────────────
set -g mouse on                         # mouse support (scroll, click pane, resize)
set -g history-limit 50000              # large scrollback
set -g display-time 2000                # status messages stay 2s
set -g status-interval 5               # refresh status bar every 5s
set -g base-index 1                     # windows start at 1, not 0
set -g pane-base-index 1               # panes too
set -g renumber-windows on             # fill gaps when windows are closed
set -sg escape-time 0                  # no ESC delay (critical for Neovim)
set -g focus-events on                 # pass focus events to apps (Neovim)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"  # true color

# ─── Vi Mode ─────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ─── Pane Splits (easier to remember) ────────────────
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ─── Pane Navigation (vim-style) ─────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ─── Resize panes ─────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ─── Quick reload ─────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ─── Session helpers ──────────────────────────────────
set -g detach-on-destroy off           # don't exit tmux when killing a session
#bind x kill-pane                       # skip the confirmation prompt
bind C-c new-session                   # quick new session

# ─── Status Bar (base — Dracula plugin overrides most of this) ──
#set -g status-position top

